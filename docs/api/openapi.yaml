              schema: { $ref: "#/components/schemas/PlatformConfig" }

  /platform/billing-settings:
    get:
      summary: Get platform billing settings
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Billing settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformBillingSettings" }
    patch:
      summary: Update platform billing settings
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trial_days: { type: integer, minimum: 0 }
                default_plan_id: { type: string }
                checkout_success_url: { type: string }
                checkout_cancel_url: { type: string }
                portal_return_url: { type: string }
      responses:
        "200":
          description: Billing settings updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformBillingSettings" }
        "400":
          description: Validation error

  /platform/tenants:
    get:
      summary: List all tenants (registry)
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Tenant registry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PlatformTenant" }

  /platform/tenants/{id}:
    patch:
      summary: Suspend tenant or assign plan
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                suspended: { type: boolean }
                plan_id: { type: string }
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformTenant" }
        "404":
          description: Tenant not found

  /platform/stats:
    get:
      summary: Platform dashboard KPIs
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformStats" }

  /platform/audit-log:
    get:
      summary: Platform audit log (read-only)
      tags: [Platform]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Audit entries (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PlatformAuditEntry" }
