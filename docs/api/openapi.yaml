openapi: 3.1.0
info:
  title: FieldForge API
  version: 0.3.0
  description: |
    Multitenant ERP API for field services (US).
    Protected routes require `Authorization: Bearer <token>` and `X-Tenant-ID` header.

    ## Cross-cutting middleware

    - **Rate limiting:** Public routes (`/auth/signup`, `/auth/login`) are limited per client IP.
      Authenticated routes are limited per tenant. Responses include `X-RateLimit-Limit`,
      `X-RateLimit-Remaining`, and `X-RateLimit-Reset`. HTTP 429 includes `Retry-After`.
    - **Idempotency:** `POST` requests on protected routes accept optional `Idempotency-Key`.
      Replays within 24h return the cached response with `Idempotency-Replayed: true`.
    - **Domain events:** Mutations publish to the transactional outbox (`domain_events`);
      a background worker marks events `processed` after dispatch.

servers:
  - url: https://api.fieldforge.com/api/v1
    description: Production
  - url: http://localhost:8081/api/v1
    description: Local API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Optional UUID for safe POST retries. When present, duplicate requests return
        the original response (HTTP 2xx) with `Idempotency-Replayed: true`.
      schema:
        type: string
        format: uuid
  responses:
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema: { type: integer }
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer, description: Unix timestamp when the window resets }
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code: { type: string, example: HTTP_429 }
                  message: { type: string, example: rate limit exceeded }
    IdempotentReplay:
      description: Cached response from a prior request with the same Idempotency-Key
      headers:
        Idempotency-Replayed:
          schema: { type: string, enum: ["true"] }
  schemas:
    PublicPlan:
      type: object
      required: [id, name, description]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        price_monthly: { type: number, nullable: true }
        price_monthly_cents: { type: integer, nullable: true }
        price_from: { type: number, nullable: true }
        badge: { type: string, nullable: true }
        features:
          type: array
          items: { type: string }
    PlatformPlan:
      type: object
      required: [id, name, description, active, sort_order]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        price_monthly_cents: { type: integer, nullable: true }
        stripe_price_id: { type: string }
        features: {}
        active: { type: boolean }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PlatformPromotion:
      type: object
      required: [id, code, active, redemption_count]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        description: { type: string }
        discount_percent: { type: integer, nullable: true }
        discount_cents: { type: integer, nullable: true }
        plan_id: { type: string }
        starts_at: { type: string, format: date-time, nullable: true }
        ends_at: { type: string, format: date-time, nullable: true }
        max_redemptions: { type: integer, nullable: true }
        redemption_count: { type: integer }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LandingContentBlock:
      type: object
      required: [id, section, block_key, content, active, sort_order]
      properties:
        id: { type: string, format: uuid }
        section:
          type: string
          enum: [hero, features, pricing, footer]
        block_key: { type: string }
        content: { type: object, additionalProperties: true }
        active: { type: boolean }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PlatformConfig:
      type: object
      properties:
        brand_overrides: { type: object, additionalProperties: true }
        feature_flags:
          type: object
          additionalProperties: { type: boolean }
        updated_at: { type: string, format: date-time }
    PlatformBillingSettings:
      type: object
      properties:
        trial_days: { type: integer, minimum: 0 }
        default_plan_id: { type: string }
        checkout_success_url: { type: string }
        checkout_cancel_url: { type: string }
        portal_return_url: { type: string }
        updated_at: { type: string, format: date-time }
    PlatformTenant:
      type: object
      required: [id, slug, name, industry_pack, plan_id, subscription_status, created_at]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        industry_pack: { type: string }
        plan_id: { type: string }
        subscription_status: { type: string }
        suspended_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    PlatformStats:
      type: object
      properties:
        total_tenants: { type: integer }
        active_tenants: { type: integer }
        suspended_tenants: { type: integer }
        signups_last_30_days: { type: integer }
        tenants_by_plan:
          type: object
          additionalProperties: { type: integer }
        total_plans: { type: integer }
        active_promotions: { type: integer }
    PlatformAuditEntry:
      type: object
      required: [id, action, resource_type, details, created_at]
      properties:
        id: { type: string, format: uuid }
        admin_id: { type: string, format: uuid, nullable: true }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, nullable: true }
        details: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }

paths:
  /health:
    get:
      summary: Liveness probe
      tags: [System]
      responses:
        "200":
          description: OK

  /health/ready:
    get:
      summary: Readiness probe (DB)
      tags: [System]
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready

  /config/public:
    get:
      summary: Public config subset (brand, pricing — no secrets)
      tags: [System]
      responses:
        "200":
          description: Public configuration

  /public/quotes/{token}:
    get:
      summary: Client-facing quote by public token (no auth)
      tags: [Estimating]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public quote with line items and company name
        "404":
          description: Quote not found or not shareable
        "429":
          $ref: "#/components/responses/RateLimited"

  /public/quotes/{token}/accept:
    post:
      summary: Accept quote from client portal (no auth)
      tags: [Estimating]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote accepted
        "400":
          description: Cannot accept
        "404":
          description: Quote not found
        "429":
          $ref: "#/components/responses/RateLimited"

  /public/portal/login:
    post:
      summary: Request customer portal magic link (no auth)
      tags: [Portal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, tenant_slug]
              properties:
                email:
                  type: string
                  format: email
                tenant_slug:
                  type: string
      responses:
        "200":
          description: Generic success (no email enumeration)
        "429":
          $ref: "#/components/responses/RateLimited"

  /public/portal/verify:
    post:
      summary: Exchange magic link token for customer session JWT
      tags: [Portal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Customer session token
        "401":
          description: Invalid or expired link
        "429":
          $ref: "#/components/responses/RateLimited"

  /portal/me:
    get:
      summary: Current customer portal profile
      tags: [Portal]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer profile
        "401":
          $ref: "#/components/responses/Unauthorized"

  /portal/invoices:
    get:
      summary: List invoices for authenticated customer (sent/paid only)
      tags: [Portal]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invoice list
        "401":
          $ref: "#/components/responses/Unauthorized"

  /portal/invoices/{id}:
    get:
      summary: Get one invoice for authenticated customer
      tags: [Portal]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /industry-packs:
    get:
      summary: List industry packs for onboarding
      tags: [Onboarding]
      responses:
        "200":
          description: Industry packs

  /plugins:
    get:
      summary: List registered plugins
      tags: [System]
      responses:
        "200":
          description: Plugin manifests

  /auth/signup:
    post:
      summary: Create tenant and owner account
      tags: [Auth]
      description: Rate limited per client IP (default 20 req/min).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_name, email, password, industry_pack]
              properties:
                company_name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                industry_pack: { type: string }
                plan_id: { type: string }
      responses:
        "201":
          description: Account created with JWT
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      description: Rate limited per client IP (default 20 req/min).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: JWT token
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/me:
    get:
      summary: Current user profile
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: User profile

  /users:
    get:
      summary: List workspace users for the current tenant
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Tenant-scoped user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        email: { type: string, format: email }
                        role: { type: string }
                        first_name: { type: string }
                        last_name: { type: string }
                        created_at: { type: string, format: date-time }

  /nav:
    get:
      summary: Aggregated navigation items from enabled plugins
      tags: [System]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Nav items

  /billing/checkout:
    post:
      summary: Create Stripe checkout session (mock when debug.mock_stripe=true)
      tags: [Billing]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id: { type: string }
                success_url: { type: string }
                cancel_url: { type: string }
      responses:
        "200":
          description: Checkout session with checkout_url

  /billing/webhook:
    post:
      summary: Stripe webhook receiver
      tags: [Billing]
      parameters:
        - name: Stripe-Signature
          in: header
          schema: { type: string }
      responses:
        "200":
          description: Event received

  /crm/customers:
    get:
      summary: List customers
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Customer list
    post:
      summary: Create customer
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      responses:
        "201":
          description: Customer created
        "429":
          $ref: "#/components/responses/RateLimited"

  /crm/leads:
    get:
      summary: List leads
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Lead list
    post:
      summary: Create lead
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Lead created

  /crm/leads/{id}:
    get:
      summary: Get lead
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Lead detail
    patch:
      summary: Update lead status or contact info
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Updated lead

  /crm/leads/board:
    get:
      summary: Leads pipeline board — columns grouped by status
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Board with columns, summary counts, and flat lead list

  /crm/customers/{id}:
    get:
      summary: Get customer
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Customer detail
    patch:
      summary: Update customer
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Updated customer

  /crm/customers/{id}/properties:
    get:
      summary: List customer properties
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Property list

  /crm/contracts:
    get:
      summary: List contracts
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Contract list

  /crm/contracts/templates:
    get:
      summary: List contract templates
      tags: [CRM]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Standard US service agreement templates for the tenant

  /payroll/employees:
    get:
      summary: List employees
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Employee list
    post:
      summary: Create employee
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string }
                employment_type: { type: string, enum: [w2, "1099"] }
                hourly_rate_cents: { type: integer, format: int64 }
      responses:
        "201":
          description: Employee created

  /payroll/timesheets:
    get:
      summary: List timesheets
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Timesheet list
    post:
      summary: Create timesheet entry
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Timesheet created

  /payroll/timesheets/{id}/submit:
    post:
      summary: Submit timesheet for approval
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Timesheet submitted

  /payroll/timesheets/{id}/approve:
    post:
      summary: Approve submitted timesheet
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Timesheet approved

  /payroll/runs:
    get:
      summary: List payroll runs
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Payroll run list
    post:
      summary: Create payroll run draft
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Payroll run created

  /payroll/runs/{id}/submit:
    post:
      summary: Submit payroll run for processing
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Payroll run submitted

  /payroll/tax-profiles:
    get:
      summary: List employee tax withholding profiles
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Tax profile list
    post:
      summary: Create or update employee W-4 tax profile
      tags: [Payroll]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Tax profile saved

  /scheduling/jobs:
    get:
      summary: List jobs
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Job list
    post:
      summary: Schedule a job
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      responses:
        "201":
          description: Job created
        "429":
          $ref: "#/components/responses/RateLimited"

  /scheduling/schedule:
    get:
      summary: Calendar view of scheduled jobs
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: Range start (RFC3339 or YYYY-MM-DD; default today)
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: Range end (default from + 7 days)
      responses:
        "200":
          description: Jobs grouped by date with by_date array

  /scheduling/crews:
    get:
      summary: List crews
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Crew list
    post:
      summary: Create crew
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Crew created

  /scheduling/crews/{id}:
    get:
      summary: Get crew
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Crew detail
    patch:
      summary: Update crew
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated crew
    delete:
      summary: Delete crew
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Crew deleted

  /scheduling/routes:
    get:
      summary: Daily route stops (stub — optimization pending)
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: date
          in: query
          schema: { type: string, format: date }
          description: Route date (YYYY-MM-DD; default today)
      responses:
        "200":
          description: Route list with ordered stops

  /scheduling/map:
    get:
      summary: Map pins for scheduled jobs and active crews
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Geo pins (stub coordinates)

  /scheduling/recurring-jobs:
    get:
      summary: List recurring job templates
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "200":
          description: Recurring job list
    post:
      summary: Create recurring job template
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/TenantID" }]
      responses:
        "201":
          description: Recurring job created

  /scheduling/recurring-jobs/{id}:
    get:
      summary: Get recurring job
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Recurring job detail
    patch:
      summary: Update recurring job
      tags: [Scheduling]
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/TenantID" }
        - name: id
          in: path
          required: true
