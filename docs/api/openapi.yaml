openapi: 3.1.0
info:
  title: FieldForge API
  version: 0.1.0
  description: |
    Multitenant ERP API for field services (US).
    Full spec generated from Go handlers — Fase 4 development.

servers:
  - url: https://api.fieldforge.com/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local

paths:
  /health:
    get:
      summary: Liveness probe
      tags: [System]
      responses:
        "200":
          description: OK

  /health/ready:
    get:
      summary: Readiness probe (DB, Redis, queue)
      tags: [System]
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready

  /config/public:
    get:
      summary: Public config subset (brand, pricing — no secrets)
      tags: [System]
      responses:
        "200":
          description: Public configuration

  /industry-packs:
    get:
      summary: List industry packs for onboarding
      tags: [Onboarding]
      responses:
        "200":
          description: Industry packs

# TODO Fase 4: generate full spec from code (swaggo/swag or oapi-codegen)
