name: Deploy Production

# Triggered by release tags per docs/ops/runbooks/deploy.md
on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-api-image:
    name: Build API Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-web-image:
    name: Build web Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fieldforge.com/api/v1

  build-marketing-image:
    name: Build marketing Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/marketing
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/marketing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fieldforge.com/api/v1
            NEXT_PUBLIC_APP_URL=https://app.fieldforge.com

  deploy-green:
    name: Deploy to green slot
    needs: [build-api-image, build-web-image, build-marketing-image]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy stack to green
        run: |
          echo "::notice::Deploying API ${{ needs.build-api-image.outputs.image }} to green slot"
          echo "::notice::Deploy web + marketing images via docker-compose.prod.yml on target host"
          echo "DEPLOY_SLOT=green" >> "$GITHUB_ENV"
          echo "DEPLOY_IMAGE=${{ needs.build-api-image.outputs.image }}" >> "$GITHUB_ENV"

  smoke-tests:
    name: Smoke tests (green)
    needs: deploy-green
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for green readiness
        run: |
          echo "::notice::Waiting for green slot health checks"
          sleep 5

      - name: GET /health/ready
        run: |
          echo "::notice::curl -fsS \${{ secrets.PROD_GREEN_API_URL }}/health/ready"

      - name: GET /metrics
        run: |
          echo "::notice::curl -fsS \${{ secrets.PROD_GREEN_API_URL }}/metrics"

      - name: POST /auth/login (test user)
        run: |
          echo "::notice::Smoke login against green slot"

      - name: GET /api/v1/industry-packs
        run: |
          echo "::notice::curl -fsS \${{ secrets.PROD_GREEN_API_URL }}/api/v1/industry-packs"

  switch-traffic:
    name: Switch traffic to green
    needs: smoke-tests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Route 100% traffic to green
        run: |
          echo "::notice::Switching load balancer traffic to green slot"

  monitor:
    name: Post-deploy monitor (30min)
    needs: switch-traffic
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Monitor error rate and p95
        run: |
          echo "::notice::Monitoring for 30 minutes — error rate, p95 latency, Sentry"
          echo "See docs/ops/slo.md for alert thresholds"

      - name: Announce release
        run: |
          echo "::notice::Announce in #releases Slack — tag ${{ github.ref_name }}"
