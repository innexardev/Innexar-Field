case_studies:
  cleaning:
    - company: Sparkle Pro Cleaning
      location: Austin, TX
      team_size: "12 crew members"
      headline: From spreadsheet chaos to 340 recurring contracts in 18 months
      challenge: >
        Owner Maria ran routes in Google Calendar and invoiced in QuickBooks.
        Missed visits, double-booked crews, and no-shows cost an estimated
        $4,200/month in lost revenue.
      solution: >
        Migrated recurring clients to schedule templates with automatic job
        generation, crew mobile checklists, and a client portal for
        reschedules and card-on-file payments.
      results:
        - label: Recurring contracts
          value: "340+"
        - label: No-show rate
          value: "-62%"
        - label: Admin hours/week
          value: "-15 hrs"
      quote: >
        We stopped firefighting the calendar and started selling maintenance
        plans. Recurring revenue finally feels predictable.
      author: Maria Gonzalez, Owner

  construction:
    - company: RidgeLine Builders
      location: Denver, CO
      team_size: "8 field + 3 office"
      headline: Job costing caught a $18K overrun before the client noticed
      challenge: >
        PMs tracked budgets in spreadsheets disconnected from timesheets and
        AP. Two active remodels were trending 12% over budget with no early
        warning until month-end.
      solution: >
        Rolled out cost-code budgets tied to daily labor entries and material
        POs. Weekly job reviews with percent-complete vs. spend dashboards for
        every active project.
      results:
        - label: Budget variance caught early
          value: "100%"
        - label: Change order capture
          value: "+28%"
        - label: Gross margin on fixed-price jobs
          value: "+4.2 pts"
      quote: >
        We saw the slide on week three, not week twelve. That one job paid for
        the platform for the year.
      author: James Whitfield, Project Manager

  field-services:
    - company: Summit HVAC & Plumbing
      location: Phoenix, AZ
      team_size: "22 technicians"
      headline: Same-day invoicing lifted cash collection from 34 to 11 days
      challenge: >
        Technicians left paper work orders at the shop; billing lagged 3–5 days.
        Parts usage was under-billed and maintenance agreement renewals slipped
        through the cracks.
      solution: >
        Mobile work orders with checklists, photo capture, and parts logging.
        Dispatch board with skill-based routing and automated post-visit
        invoices with payment links.
      results:
        - label: Days to collect
          value: "11 avg"
        - label: Jobs completed/day/tech
          value: "+1.4"
        - label: Maintenance renewals
          value: "+41%"
      quote: >
        Techs collect payment before they leave the driveway. The office
        stopped playing catch-up every Friday.
      author: Derek Chen, Operations Director

