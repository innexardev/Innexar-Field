# Local dev infrastructure only (Postgres + Redis).
# App processes run on the host — see Makefile `dev` / README "Dev URLs":
#   API :8081  Web :3000  Marketing :3001  Admin :3002

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fieldforge
      POSTGRES_PASSWORD: fieldforge
      POSTGRES_DB: fieldforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
